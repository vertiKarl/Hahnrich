<!DOCTYPE html>
<head>
    <title>Hahnrich Control Panel</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <style>
        html {
            background: rgb(119,88,120);
            background: linear-gradient(165deg, rgba(119,88,120,1) 0%, rgba(56,80,83,1) 100%); 
            color: white;
            width: 100%;
            height: 100%;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            min-width: 5vw;
            min-height: 25vh;
            margin: 10px;
        }

        .item h1 {
            text-align: center;
        }

        .bottom-popout {
            margin: 0;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            overflow: hidden;
            height: 15vh;
            background-color: rgba(0, 0, 0, 0.7);
            border-top: 5px solid black;
        }

        .bottom-popout input {
            position: absolute;
            height: 5%;
            width: 100%;
            padding: 10px;
            bottom: 0;
        }
    </style>

    <script>

        let checkCPU = true;
        let checkRAM = true;
        let checkPC = true;

        window.onload = () => {
            document.getElementById("term").addEventListener("keyup", function(event) {
                if (event.keyCode === 13) {
                    console.log("adad")
                    sendCommand()
                }
            })
            tick()
            setInterval(tick, 1000)
        }

        function usage(cpu) {
            console.log(cpu)
            let totalUsage = 0;
            for(let detail in cpu) {
                if(detail != "idle") {
                    totalUsage += cpu[detail];
                }
            }
            let totalCycles = totalUsage + cpu.idle;
            return 100 * (totalUsage / totalCycles);
        }

        function tick() {
            console.log("Tick")

            // CPU
            if(checkCPU) {
                fetch("/CPU")
                .then(async (res) => {
                    res = await res.json();
                    const div = document.getElementById("cores")
                    if(div.children.length != res.cores.length) {
                        div.innerHTML = "";
                        const usage = document.createElement("p");
                        usage.innerHTML = "Usage: " + res.usage.toFixed(2) + "%";
                        div.append(usage);
                        let i = 0;
                        for(const core of res.cores) {
                            const stats = document.createElement("ol");
                            const name = document.createElement("p");
                            const speed = document.createElement("p");
                            const usage = document.createElement("p");

                            stats.innerHTML = "Core "+i++;

                            name.innerHTML = "Model: " + core.model;
                            speed.innerHTML = "Speed: " + core.speed + " MHz";

                            stats.append(name);
                            stats.append(speed);
                            div.append(stats)
                        }
                    } else {
                        let i = 0;
                        div.children[0].innerHTML = "Usage: " + res.usage.toFixed(2) + "%";
                        for(const child of div.children) {
                            child.children[0].innerHTML = "Model: " + res.cores[i].model;
                            child.children[1].innerHTML = "Speed: " + res.cores[i].speed + " MHz";
                            i++
                        }
                    }
                })
                .catch(err => {
                    console.error(err)
                })
            }

            // RAM
            if(checkRAM) {
                fetch("/RAM")
                .then(async (res) => {
                    res = await res.json();
                    const div = document.getElementById("ramInfo");
                    if(div.children.length == 0) {
                        const total = document.createElement("p");
                        const free = document.createElement("p");
                        const used = document.createElement("p");

                        total.innerHTML = "Total: " + (res.total / 1024 / 1024) + " MB";
                        free.innerHTML = "Free: " + Math.round(res.free / 1024 / 1024) + " MB";
                        used.innerHTML = "Used: " + Math.round((res.total -  res.free) / 1024 / 1024) + " MB";

                        div.append(total);
                        div.append(free);
                        div.append(used);
                    } else {
                        div.children[0].innerHTML = "Total: " + (res.total / 1024 / 1024) + " MB";
                        div.children[1].innerHTML = "Free: " + Math.round(res.free / 1024 / 1024) + " MB";
                        div.children[2].innerHTML = "Used: " + Math.round((res.total -  res.free) / 1024 / 1024) + " MB";
                    }
                })
            }

            // Rig
            if(checkPC) {
                fetch("/PC")
                .then(async (res) => {
                    res = await res.json();
                    const div = document.getElementById("pcInfo");
                    if(div.children.length == 0) {
                        const hostname = document.createElement("p");
                        const networkifs = document.createElement("ol");
                        const platform = document.createElement("p");
                        const uptime = document.createElement("p");
                        const version = document.createElement("p");

                        hostname.innerHTML = "Hostname: " + res.hostname
                        platform.innerHTML = "Platform: " + res.platform + " " + res.arch + " (" + res.type + ")"
                        version.innerHTML = "Version: " + res.version
                        uptime.innerHTML = "Uptime: " + Math.floor(res.uptime / 60 / 60 / 24) + " Days " + Math.floor(res.uptime / 60 / 60 % 24) + " Hours"
                        for(const interface in res.networkifs) {
                            const intf = document.createElement("p");

                            // IPv4
                            const details4 = res.networkifs[interface][0];
                            const details6 = res.networkifs[interface][1];
                            
                            intf.innerHTML = interface + ": <br>IPv4<br>" + 
                            " CIDR: " + details4.cidr + "<br>" +
                            " MAC: " + details4.mac + "<br>IPv6<br>" +
                            " CIDR: " + details6.cidr + "<br>" +
                            " MAC: " + details6.mac;


                            networkifs.append(intf)
                        }

                        div.append(hostname)
                        div.append(networkifs)
                        div.append(platform)
                        div.append(uptime)
                        div.append(version)

                    }
                })
            }



            
        }


        function sendCommand() {
            // TODO
        }
        
    </script>
</head>

<body>
    <div style="display:flex;justify-content:center;">
        <h1>Hahnrich Control Panel</h1>
    </div>
    <div class="container">
        <div id="PC" class="item">
            <h1>PC</h1>
            <div id="pcInfo">
            </div>
        </div>
        <div id="CPU" class="item">
            <h1>CPU</h1>
            <div id="cores">
            </div>
        </div>
        <div id="RAM" class="item">
            <h1>RAM</h1>
            <div id="ramInfo">
            </div>
        </div>
        <div id="Terminal" class="bottom-popout">
            <input id="term" type="text" placeholder="Enter a command"></input>
        </div>
    </div>
</body>
